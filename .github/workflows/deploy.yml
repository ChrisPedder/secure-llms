name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1

jobs:
  deploy-shared:
    name: Deploy shared infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and deploy shared stack
        working-directory: infra
        run: |
          npm ci
          npx cdk deploy --require-approval never

  deploy-federated:
    name: Deploy federated learning
    needs: deploy-shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and deploy federated stack
        working-directory: federated/infra
        run: |
          npm ci
          npx cdk deploy --require-approval never

  deploy-fhe:
    name: Deploy FHE fraud detection
    needs: deploy-shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and deploy FHE stack
        working-directory: fhe/infra
        run: |
          npm ci
          npx cdk deploy --require-approval never

  deploy-enclave:
    name: Deploy enclave chatbot
    needs: deploy-shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and deploy enclave stack
        working-directory: enclave/infra
        run: |
          npm ci
          npx cdk deploy --require-approval never

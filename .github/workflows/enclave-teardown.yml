name: Enclave Teardown Check

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  check-and-teardown:
    name: Check enclave instance and teardown if idle
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}

      - name: Check and stop idle enclave instance
        run: |
          STACK_NAME="SecureLlmsEnclave"

          INSTANCE_ID=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='InstanceId'].OutputValue" \
            --output text 2>/dev/null || echo "")

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "No enclave stack found — nothing to do"
            exit 0
          fi

          STATE=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].State.Name" \
            --output text)

          echo "Instance $INSTANCE_ID is $STATE"

          if [ "$STATE" != "running" ]; then
            echo "Instance not running — no action needed"
            exit 0
          fi

          # Check CloudWatch for recent activity (last 35 minutes)
          DATAPOINTS=$(aws cloudwatch get-metric-statistics \
            --namespace "SecureLlms/Enclave" \
            --metric-name "LastRequestTimestamp" \
            --start-time "$(date -u -d '35 minutes ago' +%Y-%m-%dT%H:%M:%S 2>/dev/null || date -u -v-35M +%Y-%m-%dT%H:%M:%S)" \
            --end-time "$(date -u +%Y-%m-%dT%H:%M:%S)" \
            --period 300 \
            --statistics Maximum \
            --query "Datapoints | length(@)" \
            --output text)

          echo "Activity datapoints in last 35 min: $DATAPOINTS"

          if [ "$DATAPOINTS" = "0" ]; then
            echo "No recent activity — stopping instance"
            aws ec2 stop-instances --instance-ids "$INSTANCE_ID"
            echo "Stop initiated for $INSTANCE_ID"
          else
            echo "Recent activity detected — keeping instance running"
          fi

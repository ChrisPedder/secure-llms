name: FHE Train

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1

jobs:
  train:
    name: Train FHE fraud detection model
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: pip install uv

      - name: Download dataset from S3
        working-directory: fhe
        run: |
          BUCKET=$(aws cloudformation describe-stacks --stack-name SecureLlmsFhe \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" --output text)
          echo "BUCKET=$BUCKET" >> "$GITHUB_ENV"
          mkdir -p data
          echo "Downloading s3://$BUCKET/creditcard.csv..."
          aws s3 cp "s3://$BUCKET/creditcard.csv" ./data/creditcard.csv

      - name: Train model
        working-directory: fhe
        run: |
          uv sync
          uv run python -m src.run train \
            --data-path ./data/creditcard.csv \
            --model-dir ./model

      - name: Upload model to S3
        working-directory: fhe
        run: |
          echo "Uploading model to s3://$BUCKET/model/"
          aws s3 cp ./model/artifacts.pkl "s3://$BUCKET/model/artifacts.pkl"
          echo ""
          echo "============================================"
          echo "  Model trained and uploaded successfully"
          echo "============================================"
          echo "  Bucket: $BUCKET"
          echo "  Model:  s3://$BUCKET/model/artifacts.pkl"
          echo ""
          echo "  To download locally:"
          echo "    aws s3 cp s3://$BUCKET/model/artifacts.pkl fhe/model/artifacts.pkl"
          echo "============================================"

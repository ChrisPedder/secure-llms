name: Enclave Teardown

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  teardown:
    name: Check and tear down enclave
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check enclave state and tear down if idle
        working-directory: enclave/infra
        run: |
          STACK_NAME="SecureLlmsEnclave"

          # Check if the stack exists
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          if [ "$STACK_STATUS" = "DOES_NOT_EXIST" ]; then
            echo "No enclave stack found — nothing to do"
            exit 0
          fi

          echo "Stack status: $STACK_STATUS"

          INSTANCE_ID=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='InstanceId'].OutputValue" \
            --output text)

          STATE=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].State.Name" \
            --output text)

          echo "Instance $INSTANCE_ID is $STATE"

          if [ "$STATE" = "running" ]; then
            # Check CloudWatch for recent activity (last 35 minutes)
            START=$(date -u -d '35 minutes ago' +%Y-%m-%dT%H:%M:%S 2>/dev/null \
              || date -u -v-35M +%Y-%m-%dT%H:%M:%S)
            END=$(date -u +%Y-%m-%dT%H:%M:%S)

            DATAPOINTS=$(aws cloudwatch get-metric-statistics \
              --namespace "SecureLlms/Enclave" \
              --metric-name "LastRequestTimestamp" \
              --start-time "$START" --end-time "$END" \
              --period 300 --statistics Maximum \
              --query "Datapoints | length(@)" --output text)

            echo "Activity datapoints in last 35 min: $DATAPOINTS"

            if [ "$DATAPOINTS" = "0" ]; then
              echo "No recent activity — stopping instance as safety net"
              aws ec2 stop-instances --instance-ids "$INSTANCE_ID"
              echo "Instance stop initiated — will destroy stack on next run"
            else
              echo "Recent activity detected — keeping instance running"
            fi
            exit 0
          fi

          # Instance is stopped — destroy the entire stack
          echo "Instance is stopped — destroying stack to avoid ongoing costs"
          npm ci
          npx cdk destroy --force
          echo "Stack destroyed successfully"
